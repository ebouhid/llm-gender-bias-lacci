defaults:
  - main_config
  - _self_

BASE_MODEL: "Qwen/Qwen2.5-7B-Instruct"
NLA_LAYER: 20
AV_CHECKPOINT: "checkpoints/nla-qwen2.5-7b-L20-av"
AR_CHECKPOINT: "checkpoints/nla-qwen2.5-7b-L20-ar"

SGLANG_NLA_URL: "http://localhost:30001"
DEVICE: "cuda:0"
DTYPE: "bfloat16"

VERBALIZATION_TIER: "tier1"
VERBALIZATION_BATCH_SIZE: 8
VERBALIZATION_CONCURRENCY: 4
VERBALIZATION_FLUSH_ROWS: 512
RECONSTRUCTION_BATCH_SIZE: 32
RECONSTRUCTION_FLUSH_ROWS: 512
TEMPERATURE: 0.7
MAX_NEW_TOKENS: 200

ARTIFACTS_DIR: "artifacts/nla"

# Path for outcome-linked analysis join and teacher-forced response activations
GENERATION_JSONL: "data/generated_recommendations.jsonl"

# Report caps (null = all examples for sample pages)
REPORT_MAX_SAMPLES: null
REPORT_MAX_TABLE_ROWS: 2000

RUN_ID: null

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
