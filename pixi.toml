[workspace]
authors = ["Anderson Soares <andersonlbsoares@alu.ufc.br>"]
channels = ["conda-forge"]
name = "ideological_chamaleon"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
teste = "python teste.py"
main = "python run_main.py"
analysis = "python run_analysis.py"
nla-extract = "python scripts/extract_nla_activations.py"
nla-verbalize = "python scripts/run_nla_verbalization.py"
nla-reconstruct = "python scripts/run_nla_reconstruction.py"
nla-analyze = "python scripts/analyze_nla_gender_bias.py"
nla-visualize = "python scripts/visualize_nla_results.py"
nla-sglang-verbalize = "python -m sglang.launch_server --model-path checkpoints/nla-qwen2.5-7b-L20-av --port 30001 --dtype bfloat16 --disable-radix-cache --trust-remote-code --max-running-requests 32"
nla-sglang-basemodel = "python -m sglang.launch_server   --model-path Qwen/Qwen2.5-7B-Instruct   --host 127.0.0.1   --port 30000"
order-exp-run = "python scripts/run_order_experiment.py"
order-exp-analyze = "python scripts/analyze_order_experiment.py"

[dependencies]
python = "3.12.*"
hydra-core = ">=1.3.2,<2"
pandas = ">=2.3.3,<3"
seaborn = ">=0.13.2,<0.14"
scipy = ">=1.11.0,<2"
time = ">=1.9,<2"
tqdm = ">=4.67.1,<5"
ollama-python = ">=0.6.1,<0.7"
openai = ">=2.8.1,<3"
python-dotenv = ">=1.2.1,<2"
google-genai = ">=1.52.0,<2"
scikit-learn = ">=1.3.0,<2"
geopandas = ">=0.14.0,<1"
matplotlib = ">=3.8.0,<4"
openpyxl = ">=3.1.5,<4"

[pypi-dependencies]
xai-sdk = ">=1.4.1, <2"
torch = ">=2.0"
transformers = ">=4.40"
safetensors = ">=0.4"
httpx = ">=0.27"
orjson = ">=3.9"
pyyaml = ">=6.0"
numpy = ">=1.26"
pyarrow = ">=14.0"
accelerate = ">=1.10"
jinja2 = ">=3.1"
plotly = ">=5.18"

[target.linux-64.pypi-dependencies]
sglang = { version = ">=0.4.9.post3, <0.5", extras = ["all"] }

